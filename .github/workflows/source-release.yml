name: Build friend-friendly release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to receive the Windows ZIP"
        required: false
        type: string

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Use Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the safe Windows ZIP
        shell: pwsh
        run: python scripts/export_release.py --output release/reference-desk-windows.zip

      - name: Keep a downloadable workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-desk-windows
          path: release/reference-desk-windows.zip
          if-no-files-found: error

      - name: Attach the ZIP to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = if ($env:RELEASE_TAG) { $env:RELEASE_TAG } else { $env:GITHUB_REF_NAME }
          $archive = "release/reference-desk-windows.zip"
          gh release view $tag --json tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $archive --clobber
          } else {
            gh release create $tag $archive --title "Reference Desk $tag" --generate-notes
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
